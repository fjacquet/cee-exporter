version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - errorlint
    - copyloopvar
    - unconvert
    - nilerr

  settings:
    errcheck:
      check-type-assertions: false
    errorlint:
      errorf: true
      asserts: true
      comparison: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
