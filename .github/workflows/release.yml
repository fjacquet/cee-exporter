name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release and upload assets
  packages: write   # push to GHCR

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Tests ────────────────────────────────────────────────────────────────
      - name: Run tests
        run: make test

      # ── Binaries ─────────────────────────────────────────────────────────────
      - name: Build Linux binary
        run: make build

      - name: Build Windows binary
        run: make build-windows

      - name: Archive binaries
        run: |
          tar -czf cee-exporter-linux-amd64.tar.gz cee-exporter
          zip cee-exporter-windows-amd64.zip cee-exporter.exe

      # ── Docker ───────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cee-exporter-linux-amd64.tar.gz
            cee-exporter-windows-amd64.zip
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            docker run -p 12228:12228 \
              -v ./config.toml:/etc/cee-exporter/config.toml:ro \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ## Binaries

            | Platform | File |
            |----------|------|
            | Linux/amd64 | `cee-exporter-linux-amd64.tar.gz` |
            | Windows/amd64 | `cee-exporter-windows-amd64.zip` |
