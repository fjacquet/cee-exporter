name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'mkdocs.yml'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required for mkdocs git-revision-date plugin (if used later)
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install mkdocs-material
        run: pip install mkdocs-material

      # Copy README.md into docs/ as the home page source so the full
      # installation guide is visible on the docs site without duplication.
      - name: Prepare docs home page
        run: cp README.md docs/index.md

      - name: Build & deploy to gh-pages branch
        run: mkdocs gh-deploy --force --clean
        env:
          # mkdocs gh-deploy uses git to push; GITHUB_TOKEN provides write access.
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
