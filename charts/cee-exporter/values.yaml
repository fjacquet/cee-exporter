replicaCount: 1

image:
  repository: ghcr.io/fjacquet/cee-exporter
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  # CEPA TCP listener port (evidence: Dockerfile EXPOSE 12228, config.toml listen.addr default)
  port: 12228
  # Optional: expose the Prometheus /metrics port (9228) if metrics.enabled=true in config
  metricsPort: 9228

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# ASSUMPTION: cee-exporter exposes a /health endpoint on its CEPA listener port (port 12228).
# Evidence: README says "Check health: curl http://localhost:12228/health" and config.toml.example
# confirms this is on the same addr as the CEPA listener. Using httpGet on /health path.
livenessProbe:
  httpGet:
    path: /health
    port: cepa
  initialDelaySeconds: 10
  periodSeconds: 30
readinessProbe:
  httpGet:
    path: /health
    port: cepa
  initialDelaySeconds: 5
  periodSeconds: 10

volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

extraArgs: []

existingSecret: ""

# Inline cee-exporter config, rendered into a Secret as config.toml.
# Mounted at /etc/cee-exporter/config.toml (passed via -config flag).
# Replace gelf_host with your actual Graylog IP/hostname.
config: |
  [listen]
  addr = "0.0.0.0:12228"
  tls_mode = "off"

  [output]
  type          = "gelf"
  gelf_host     = "graylog.corp.local"
  gelf_port     = 12201
  gelf_protocol = "udp"
  gelf_tls      = false

  [queue]
  capacity = 100000
  workers  = 4

  [logging]
  level  = "info"
  format = "json"

  [metrics]
  enabled = true
  addr    = "0.0.0.0:9228"

env: []
# - name: CEE_LOG_LEVEL
#   value: debug
# - name: CEE_LOG_FORMAT
#   value: json

deploymentAnnotations: {}

podAnnotations:
  # cee-exporter exposes /metrics on port 9228 when metrics.enabled=true in config
  prometheus.io/scrape: "false"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "9228"

prometheus:
  monitor:
    enabled: false
    additionalLabels: {}
    interval: 15s
    namespace: []
    metricRelabelings: []
    relabelings: []
    targetLabels: []

  rules:
    enabled: false
    additionalLabels: {}
    namespace: ""
    additionalRules: []

  scrapeConfig:
    enabled: false
    additionalLabels: {}
    namespace: ""
    interval: 60s
    scrapeTimeout: 55s
    metricRelabelings: []
    relabelings: []
