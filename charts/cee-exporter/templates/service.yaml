apiVersion: v1
kind: Service
metadata:
  name: {{ include "cee-exporter.fullname" . }}
  labels:
    {{- include "cee-exporter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: cepa
      protocol: TCP
      name: cepa
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "cee-exporter.selectorLabels" . | nindent 4 }}
